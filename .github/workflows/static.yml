    <!-- ==================== BACK TO TOP & DARK MODE ==================== -->
    <button class="back-to-top" id="backToTop"><i class="fas fa-chevron-up"></i></button>
    <button class="dark-mode-toggle" id="darkModeToggle"><i class="fas fa-moon"></i></button>

    <!-- Toast -->
    <div class="toast" id="toast"><i class="fas fa-check-circle"></i> Gửi thành công! Cảm ơn bạn.</div>

    <!-- ==================== JAVASCRIPT ==================== -->
    <script>
        // ============================
        // PRELOADER
        // ============================
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('preloader').classList.add('hidden');
            }, 1500);
            AOS.init({
                duration: 800,
                easing: 'ease-out-cubic',
                once: true,
                offset: 80
            });
        });

        // ============================
        // PARTICLES
        // ============================
        (function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (Math.random() * 6 + 4) + 's';
                particle.style.width = particle.style.height = (Math.random() * 4 + 2) + 'px';
                container.appendChild(particle);
            }
        })();

        // ============================
        // NAVBAR SCROLL
        // ============================
        const navbar = document.getElementById('navbar');
        const backToTop = document.getElementById('backToTop');
        const navLinks = document.querySelectorAll('.nav-links a');

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;

            // Navbar bg
            navbar.classList.toggle('scrolled', scrollY > 50);

            // Back to top
            backToTop.classList.toggle('visible', scrollY > 500);

            // Active link
            const sections = document.querySelectorAll('section[id]');
            sections.forEach(sec => {
                const top = sec.offsetTop - 120;
                const bottom = top + sec.offsetHeight;
                const id = sec.getAttribute('id');
                if (scrollY >= top && scrollY < bottom) {
                    navLinks.forEach(link => {
                        link.classList.remove('active');
                        if (link.getAttribute('href') === '#' + id) {
                            link.classList.add('active');
                        }
                    });
                }
            });
        });

        backToTop.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // ============================
        // MOBILE NAV
        // ============================
        const navToggle = document.getElementById('navToggle');
        const navMobile = document.getElementById('navMobile');
        const navMobileClose = document.getElementById('navMobileClose');

        navToggle.addEventListener('click', () => navMobile.classList.add('open'));
        navMobileClose.addEventListener('click', () => navMobile.classList.remove('open'));
        navMobile.querySelectorAll('a').forEach(a => {
            a.addEventListener('click', () => navMobile.classList.remove('open'));
        });

        // ============================
        // COUNTER ANIMATION
        // ============================
        const counters = document.querySelectorAll('.counter');
        const counterObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const counter = entry.target;
                    const target = +counter.dataset.target;
                    const duration = 2000;
                    const step = target / (duration / 16);
                    let current = 0;

                    const updateCounter = () => {
                        current += step;
                        if (current < target) {
                            counter.textContent = Math.ceil(current);
                            requestAnimationFrame(updateCounter);
                        } else {
                            counter.textContent = target;
                        }
                    };
                    updateCounter();
                    counterObserver.unobserve(counter);
                }
            });
        }, { threshold: 0.5 });

        counters.forEach(c => counterObserver.observe(c));

        // ============================
        // TABS
        // ============================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });

        // ============================
        // QUOTES SLIDER
        // ============================
        let currentQuote = 0;
        const quotes = document.querySelectorAll('.quote-slide');
        const dots = document.querySelectorAll('.quote-dot');

        function showQuote(index) {
            quotes.forEach(q => q.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            quotes[index].classList.add('active');
            dots[index].classList.add('active');
            currentQuote = index;
        }

        dots.forEach(dot => {
            dot.addEventListener('click', () => showQuote(+dot.dataset.index));
        });

        setInterval(() => {
            showQuote((currentQuote + 1) % quotes.length);
        }, 5000);

        // ============================
        // DARK MODE
        // ============================
        const darkModeToggle = document.getElementById('darkModeToggle');
        darkModeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const icon = darkModeToggle.querySelector('i');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        });

        // ============================
        // CONTACT FORM
        // ============================
        document.getElementById('contactForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
            e.target.reset();
        });

        // ============================
        // CHARTS
        // ============================
        const chartColors = {
            red: 'rgba(178, 34, 34, 0.8)',
            gold: 'rgba(218, 165, 32, 0.8)',
            blue: 'rgba(52, 152, 219, 0.8)',
            green: 'rgba(39, 174, 96, 0.8)',
            purple: 'rgba(142, 68, 173, 0.8)',
            orange: 'rgba(230, 126, 34, 0.8)',
            teal: 'rgba(26, 188, 156, 0.8)',
        };

        const defaultOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    labels: { color: 'rgba(255,255,255,0.7)', font: { size: 12 } }
                }
            },
            scales: {
                x: {
                    ticks: { color: 'rgba(255,255,255,0.6)' },
                    grid: { color: 'rgba(255,255,255,0.05)' }
                },
                y: {
                    ticks: { color: 'rgba(255,255,255,0.6)' },
                    grid: { color: 'rgba(255,255,255,0.08)' }
                }
            }
        };

        // Chart 1: Conference Scale
        new Chart(document.getElementById('chartConference'), {
            type: 'bar',
            data: {
                labels: ['1998', '2004', '2008', '2012', '2016', '2021', '2024'],
                datasets: [{
                    label: 'Số đại biểu tham gia',
                    data: [300, 500, 650, 1780, 1200, 1000, 800],
                    backgroundColor: [
                        chartColors.gold, chartColors.red, chartColors.blue,
                        chartColors.green, chartColors.purple, chartColors.orange,
                        chartColors.teal
                    ],
                    borderRadius: 8,
                    borderSkipped: false,
                }]
            },
            options: {
                ...defaultOptions,
                plugins: {
                    ...defaultOptions.plugins,
                    legend: { display: false }
                }
            }
        });

        // Chart 2: GDP
        new Chart(document.getElementById('chartGDP'), {
            type: 'line',
            data: {
                labels: ['2015', '2016', '2017', '2018', '2019', '2020', '2021', '2022', '2023', '2024'],
                datasets: [{
                    label: 'GDP (tỷ USD)',
                    data: [193, 205, 224, 245, 262, 271, 366, 409, 430, 431],
                    borderColor: chartColors.gold,
                    backgroundColor: 'rgba(218,165,32,0.1)',
                    fill: true,
                    tension: 0.4,
                    pointBackgroundColor: chartColors.gold,
                    pointRadius: 5,
                    pointHoverRadius: 8,
                    borderWidth: 3,
                }]
            },
            options: defaultOptions
        });

        // Chart 3: International Students
        new Chart(document.getElementById('chartStudents'), {
            type: 'doughnut',
            data: {
                labels: ['Lào', 'Campuchia', 'Trung Quốc', 'Hàn Quốc', 'Nhật Bản', 'Pháp', 'Khác'],
                datasets: [{
                    data: [30, 20, 18, 12, 8, 5, 7],
                    backgroundColor: [
                        chartColors.red, chartColors.gold, chartColors.blue,
                        chartColors.green, chartColors.purple, chartColors.orange,
                        chartColors.teal
                    ],
                    borderWidth: 2,
                    borderColor: 'rgba(26,26,46,0.8)',
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'right',
                        labels: { color: 'rgba(255,255,255,0.7)', padding: 12, font: { size: 11 } }
                    }
                }
            }
        });

        // Chart 4: Internet Users
        new Chart(document.getElementById('chartInternet'), {
            type: 'line',
            data: {
                labels: ['2016', '2017', '2018', '2019', '2020', '2021', '2022', '2023', '2024'],
                datasets: [{
                    label: 'Người dùng (triệu)',
                    data: [49, 53, 58, 62, 68, 72, 74, 77, 79],
                    borderColor: chartColors.blue,
                    backgroundColor: 'rgba(52,152,219,0.1)',
                    fill: true,
                    tension: 0.4,
                    pointBackgroundColor: chartColors.blue,
                    pointRadius: 5,
                    pointHoverRadius: 8,
                    borderWidth: 3,
                }, {
                    label: '% Smartphone (ước tính)',
                    data: [60, 65, 72, 78, 84, 88, 92, 95, 98],
                    borderColor: chartColors.green,
                    backgroundColor: 'rgba(39,174,96,0.05)',
                    fill: true,
                    tension: 0.4,
                    pointBackgroundColor: chartColors.green,
                    pointRadius: 4,
                    borderWidth: 2,
                    borderDash: [5, 5],
                }]
            },
            options: defaultOptions
        });
    </script>
</body>
</html>
