    <!-- ==================== TIMELINE (Hội thảo QT) ==================== -->
    <section class="section" id="timeline">
        <div class="container">
            <div class="section-header" data-aos="fade-up">
                <div class="section-tag">Dòng thời gian</div>
                <h2>Hội thảo Quốc tế Việt Nam học</h2>
                <p>Diễn đàn học thuật uy tín nhất của ngành Việt Nam học, quy tụ hàng nghìn nhà nghiên cứu từ hàng chục quốc gia.</p>
            </div>

            <div class="timeline">
                <div class="timeline-item" data-aos="fade-right">
                    <div class="timeline-content">
                        <span class="timeline-year">1998</span>
                        <h3>Hội thảo lần thứ I</h3>
                        <p>Hội thảo quốc tế Việt Nam học lần đầu tiên được tổ chức tại Hà Nội – đánh dấu bước ngoặt cho ngành.</p>
                        <div class="timeline-info">
                            <span><i class="fas fa-map-marker-alt"></i> Hà Nội</span>
                        </div>
                    </div>
                    <div class="timeline-dot"></div>
                </div>

                <div class="timeline-item" data-aos="fade-left">
                    <div class="timeline-content">
                        <span class="timeline-year">2004</span>
                        <h3>Hội thảo lần thứ II</h3>
                        <p>Tổ chức tại Dinh Thống Nhất, TP.HCM. Gần 500 nhà nghiên cứu, 115 học giả từ 22 quốc gia tham dự.</p>
                        <div class="timeline-info">
                            <span><i class="fas fa-map-marker-alt"></i> TP.HCM</span>
                            <span><i class="fas fa-users"></i> 500 đại biểu</span>
                            <span><i class="fas fa-globe"></i> 22 quốc gia</span>
                        </div>
                    </div>
                    <div class="timeline-dot"></div>
                </div>

                <div class="timeline-item" data-aos="fade-right">
                    <div class="timeline-content">
                        <span class="timeline-year">2008</span>
                        <h3>Hội thảo lần thứ III</h3>
                        <p>Quay trở lại Hà Nội với chủ đề hội nhập và phát triển – mở rộng phạm vi nghiên cứu.</p>
                        <div class="timeline-info">
                            <span><i class="fas fa-map-marker-alt"></i> Hà Nội</span>
                        </div>
                    </div>
                    <div class="timeline-dot"></div>
                </div>

                <div class="timeline-item" data-aos="fade-left">
                    <div class="timeline-content">
                        <span class="timeline-year">2012</span>
                        <h3>Hội thảo lần thứ IV</h3>
                        <p>Quy mô lớn nhất với 1.780 nhà nghiên cứu đăng ký, 300+ đại biểu nước ngoài từ 36 quốc gia, gần 400 tham luận.</p>
                        <div class="timeline-info">
                            <span><i class="fas fa-map-marker-alt"></i> Hà Nội</span>
                            <span><i class="fas fa-users"></i> 1.780 đăng ký</span>
                            <span><i class="fas fa-globe"></i> 36 quốc gia</span>
                        </div>
                    </div>
                    <div class="timeline-dot"></div>
                </div>

                <div class="timeline-item" data-aos="fade-right">
                    <div class="timeline-content">
                        <span class="timeline-year">2016</span>
                        <h3>Hội thảo lần thứ V</h3>
                        <p>Tập trung vào chủ đề phát triển bền vững – đánh dấu sự trưởng thành của ngành Việt Nam học.</p>
                        <div class="timeline-info">
                            <span><i class="fas fa-map-marker-alt"></i> Hà Nội</span>
                        </div>
                    </div>
                    <div class="timeline-dot"></div>
                </div>

                <div class="timeline-item" data-aos="fade-left">
                    <div class="timeline-content">
                        <span class="timeline-year">2021</span>
                        <h3>Hội thảo lần thứ VI</h3>
                        <p>Nhận 730 tham luận, chọn 400 bài kỷ yếu và 120 báo cáo toàn văn. Chủ đề: Phát huy giá trị, khơi dậy tiềm năng.</p>
                        <div class="timeline-info">
                            <span><i class="fas fa-map-marker-alt"></i> HN & HCM</span>
                            <span><i class="fas fa-file-alt"></i> 730 tham luận</span>
                        </div>
                    </div>
                    <div class="timeline-dot"></div>
                </div>

                <div class="timeline-item" data-aos="fade-right">
                    <div class="timeline-content">
                        <span class="timeline-year">2024–2025</span>
                        <h3>Hội thảo lần thứ VII</h3>
                        <p>Phiên TP.HCM (12/2024): 52 bài khoa học. Phiên Hà Nội dự kiến tháng 8/2025. Chủ đề: Bối cảnh xuyên văn hóa & Kỷ nguyên mới.</p>
                        <div class="timeline-info">
                            <span><i class="fas fa-map-marker-alt"></i> HN & HCM</span>
                            <span><i class="fas fa-star"></i> Đang diễn ra</span>
                        </div>
                    </div>
                    <div class="timeline-dot"></div>
                </div>
            </div>
        </div>
    </section>

